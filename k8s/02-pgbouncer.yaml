# PgBouncer connection pooler for Temporal
# IMPORTANT: pool_mode must be "session" for Temporal's prepared statements to work
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: temporal
data:
  pgbouncer.ini: |
    [databases]
    * = host=192.168.69.11 port=5432

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt

    # Connection pooling settings
    # MUST use session mode - transaction mode breaks prepared statements
    pool_mode = session
    max_client_conn = 1000
    default_pool_size = 25
    min_pool_size = 5
    reserve_pool_size = 10

    # Server connection limits
    server_lifetime = 3600
    server_idle_timeout = 600

    # Logging
    log_connections = 1
    log_disconnections = 1

    # Allow client parameters that PgBouncer doesn't understand
    ignore_startup_parameters = extra_float_digits

    # Timeouts
    query_timeout = 0
    query_wait_timeout = 120
  userlist.txt: |
    "postgres" "postgres"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: temporal
  labels:
    app: pgbouncer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      containers:
      - name: pgbouncer
        image: edoburu/pgbouncer:latest
        ports:
        - name: pgbouncer
          containerPort: 5432
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: config
          mountPath: /etc/pgbouncer
          readOnly: true
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: pgbouncer-config
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: temporal
  labels:
    app: pgbouncer
spec:
  type: ClusterIP
  selector:
    app: pgbouncer
  ports:
  - name: pgbouncer
    port: 5432
    targetPort: 5432
