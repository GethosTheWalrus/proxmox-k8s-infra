# Codec Server - Temporal Payload Encryption
# Requires CODEC_ENCRYPTION_KEY secret to be created first (see deploy-all.sh)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codec-server
  namespace: temporal
  labels:
    app: codec-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: codec-server
  template:
    metadata:
      labels:
        app: codec-server
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: codec-server
        image: git.home:5050/mike/proxmox-k8s-infra/codec-server:latest
        ports:
        - name: http
          containerPort: 8888
        env:
        - name: CODEC_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: codec-encryption-key
              key: key
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8888
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8888
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: codec-server
  namespace: temporal
  labels:
    app: codec-server
spec:
  type: ClusterIP
  selector:
    app: codec-server
  ports:
  - name: http
    port: 8888
    targetPort: 8888
---
# LoadBalancer for browser access (Web UI calls codec server client-side)
apiVersion: v1
kind: Service
metadata:
  name: codec-server-lb
  namespace: temporal
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.69.96
spec:
  type: LoadBalancer
  selector:
    app: codec-server
  ports:
  - name: http
    port: 8888
    targetPort: 8888
    protocol: TCP
