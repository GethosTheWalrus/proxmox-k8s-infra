cleanup-pi-nodes:
  stage: destroy
  timeout: 15m
  image:
    name: ubuntu:latest
  variables:
    K8S1: 192.168.69.80
    PI_USER: "$PI_USERNAME"
    PI1: 192.168.69.31
    PI2: 192.168.69.32
    PI3: 192.168.69.34
    PI4: 192.168.69.36
    PI5: 192.168.69.37
    PI1_NAME: p8s1
    PI2_NAME: p8s2
    PI3_NAME: p8s3
    PI4_NAME: p8s4
    PI5_NAME: p8s5
  before_script:
    - apt update && apt install -y openssh-client sshpass
    - |
      if [ ! -f key ]; then
        echo "$SSHKEY" > key
        chmod 600 key
      fi
    - chmod 600 key
  script:
    # Drain and remove Pi nodes from the cluster
    - |
      for NODE in "$PI1_NAME" "$PI2_NAME" "$PI3_NAME" "$PI4_NAME" "$PI5_NAME"; do
        echo "Draining node $NODE..."
        ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" \
          "kubectl drain $NODE --ignore-daemonsets --delete-emptydir-data --force --timeout=60s" || true
        echo "Removing node $NODE from cluster..."
        ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" \
          "kubectl delete node $NODE --timeout=30s" || true
      done
    # Clean up Kubernetes on each Pi
    - |
      for PI in "$PI1" "$PI2" "$PI3" "$PI4" "$PI5"; do
        echo "Cleaning up Kubernetes on $PI..."
        sshpass -p "$PI_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$PI_USER"@"$PI" \
          "sudo bash -s" < scripts/remove-pi-k8s.sh || echo "WARNING: Failed to clean up $PI (may be unreachable)"
      done
    - echo "Pi node cleanup complete"
  rules:
    - when: manual
  needs: []
  allow_failure: true

destroy-cluster:
  stage: destroy
  image: 
    name: hashicorp/terraform:latest
    entrypoint: [""]
  before_script:
    - export TF_VAR_username=$(echo "$PVEUSER" | base64 -d)
    - export TF_VAR_password=$(echo "$PVEPASSWORD" | base64 -d)
    - export PROJECT_ID=5
    - export TF_USERNAME=$(echo "$GITLABUSERNAME" | base64 -d)
    - export TF_PASSWORD=$(echo "$GITLABACCESSTOKEN" | base64 -d)
    - export TF_ADDRESS="http://git.home/api/v4/projects/$PROJECT_ID/terraform/state/proxmox-k8s-infra"
    - terraform init -backend-config=address=${TF_ADDRESS} -backend-config=lock_address=${TF_ADDRESS}/lock -backend-config=unlock_address=${TF_ADDRESS}/lock -backend-config=username=${TF_USERNAME} -backend-config=password=${TF_PASSWORD} -backend-config=lock_method=POST -backend-config=unlock_method=DELETE -backend-config=retry_wait_min=5
  script:
    - terraform destroy --auto-approve=true
  allow_failure: true
  rules:
  - when: manual
  needs:
    - job: cleanup-pi-nodes
      optional: true