variables:
  REGISTRY_PATH: "git.home:5050/mike/proxmox-k8s-infra" 
  RUNNER_SCRIPT_TIMEOUT: 30m 

stages: 
  - sast
  - build
  - configure
  - deploy
  - verify
  - test
  - destroy

sast:
  stage: sast
  image:
    name: returntocorp/semgrep:latest
    entrypoint: [""]
  script:
    - semgrep scan --config=auto --verbose . || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TITLE !~ /-init$/'
      when: always
  allow_failure: true

build-codec-server:
  stage: build
  image:
    name: docker:latest
  services:
    - name: docker:dind
      command: ["--insecure-registry=git.home:5050"]
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - |
      cat > /tmp/buildkitd.toml << 'EOF'
      [registry."git.home:5050"]
        http = true
        insecure = true
      EOF
    - docker buildx create --use --name multiarch --driver docker-container --config /tmp/buildkitd.toml
    - docker buildx build
        --platform linux/amd64,linux/arm64
        --push
        -t ${REGISTRY_PATH}/codec-server:latest
        codec-server/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - codec-server/**
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TITLE =~ /-init$/'
      when: always

deploy-infra:
  stage: build
  image: 
    name: hashicorp/terraform:latest
    entrypoint: [""]
  before_script:
    - export TF_VAR_username=$(echo "$PVEUSER" | base64 -d)
    - export TF_VAR_password=$(echo "$PVEPASSWORD" | base64 -d)
    - export PROJECT_ID=5
    - export TF_USERNAME=$(echo "$GITLABUSERNAME" | base64 -d)
    - export TF_PASSWORD=$(echo "$GITLABACCESSTOKEN" | base64 -d)
    - export TF_ADDRESS="http://git.home/api/v4/projects/$PROJECT_ID/terraform/state/proxmox-k8s-infra"
    - terraform init -backend-config=address=${TF_ADDRESS} -backend-config=lock_address=${TF_ADDRESS}/lock -backend-config=unlock_address=${TF_ADDRESS}/lock -backend-config=username=${TF_USERNAME} -backend-config=password=${TF_PASSWORD} -backend-config=lock_method=POST -backend-config=unlock_method=DELETE -backend-config=retry_wait_min=5
  script:
    - terraform apply -parallelism=2 --auto-approve=true
    - terraform output vm_private_key > key
    - terraform output vm_public_key > key.pub
    - sed -i '1d;$d' key
    - chmod 600 key
    - cat key
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TITLE =~ /-init$/'
      when: always
  artifacts:
    paths:
      - scripts
      - key

init-master:
  stage: configure
  timeout: 20m
  image:
    name: ubuntu:latest
  variables:
    K8S1: 192.168.69.80
    ROLE: master
    TOKEN: abcdef.0123456789abcdef
  before_script:
    - apt update && apt install -y openssh-client
    - |
      wait_for_ssh() {
        local host=$1 retries=30 delay=10
        echo "Waiting for SSH on $host..."
        for i in $(seq 1 $retries); do
          if ssh -i key -o StrictHostKeyChecking=no -o ConnectTimeout=5 k8s@"$host" true 2>/dev/null; then
            echo "SSH ready on $host after $((i * delay - delay))s"
            return 0
          fi
          echo "Attempt $i/$retries failed, retrying in ${delay}s..."
          sleep $delay
        done
        echo "SSH not available on $host after $((retries * delay))s"
        return 1
      }
  script:
  - wait_for_ssh "$K8S1"
  - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "sudo ROLE=$ROLE TOKEN=$TOKEN bash -s" < scripts/install-k8s.sh
  - scp -i key -o StrictHostKeyChecking=no k8s@"$K8S1":~/hash $CI_PROJECT_DIR/hash
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TITLE =~ /-init$/'
      when: always
  allow_failure: false
  needs:
    - deploy-infra
  artifacts:
    paths:
      - hash
      - key
      - scripts

init-workers:
  stage: configure
  image:
    name: ubuntu:latest
  timeout: 20m
  variables:
    K8S1: 192.168.69.80
    K8S2: 192.168.69.81
    K8S3: 192.168.69.82
    K8S4: 192.168.69.83
    JOINTOKEN: abcdef.0123456789abcdef
    ROLE: worker
  before_script:
    - apt update && apt install -y openssh-client
    - |
      wait_for_ssh() {
        local host=$1 retries=30 delay=10
        echo "Waiting for SSH on $host..."
        for i in $(seq 1 $retries); do
          if ssh -i key -o StrictHostKeyChecking=no -o ConnectTimeout=5 k8s@"$host" true 2>/dev/null; then
            echo "SSH ready on $host after $((i * delay - delay))s"
            return 0
          fi
          echo "Attempt $i/$retries failed, retrying in ${delay}s..."
          sleep $delay
        done
        echo "SSH not available on $host after $((retries * delay))s"
        return 1
      }
  script:
    - wait_for_ssh "$K8S1"
    - scp -i key -o StrictHostKeyChecking=no k8s@"$K8S1":~/hash $CI_PROJECT_DIR/hash
    - wait_for_ssh "$K8S2"
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S2" "sudo ROLE=$ROLE bash -s" < $CI_PROJECT_DIR/scripts/install-k8s.sh $K8S1 $JOINTOKEN $(cat $CI_PROJECT_DIR/hash)
    - wait_for_ssh "$K8S3"
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S3" "sudo ROLE=$ROLE bash -s" < $CI_PROJECT_DIR/scripts/install-k8s.sh $K8S1 $JOINTOKEN $(cat $CI_PROJECT_DIR/hash)
    - wait_for_ssh "$K8S4"
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S4" "sudo ROLE=$ROLE bash -s" < $CI_PROJECT_DIR/scripts/install-k8s.sh $K8S1 $JOINTOKEN $(cat $CI_PROJECT_DIR/hash)
    # Label VM workers
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "kubectl label node k8s2 node-role.kubernetes.io/vm-worker= --overwrite" || true
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "kubectl label node k8s3 node-role.kubernetes.io/vm-worker= --overwrite" || true
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "kubectl label node k8s4 node-role.kubernetes.io/vm-worker= --overwrite" || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TITLE =~ /-init$/'
      when: always
  needs:
    - deploy-infra
    - init-master
  allow_failure: false
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

join-pi-nodes:
  stage: configure
  timeout: 20m
  image:
    name: ubuntu:latest
  variables:
    K8S1: 192.168.69.80
    PI_USER: "$PI_USERNAME"
    PI1: 192.168.69.31
    PI2: 192.168.69.32
    PI3: 192.168.69.34
    PI4: 192.168.69.36
    PI5: 192.168.69.37
    PI1_NAME: p8s1
    PI2_NAME: p8s2
    PI3_NAME: p8s3
    PI4_NAME: p8s4
    PI5_NAME: p8s5
  before_script:
    - apt update && apt install -y openssh-client sshpass
    - |
      if [ ! -f key ]; then
        echo "$SSHKEY" > key
        chmod 600 key
      fi
    - chmod 600 key
    - |
      wait_for_ssh_key() {
        local host=$1 user=$2 retries=30 delay=10
        echo "Waiting for SSH (key) on $host..."
        for i in $(seq 1 $retries); do
          if ssh -i key -o StrictHostKeyChecking=no -o ConnectTimeout=5 "$user"@"$host" true 2>/dev/null; then
            echo "SSH ready on $host"
            return 0
          fi
          echo "Attempt $i/$retries failed, retrying in ${delay}s..."
          sleep $delay
        done
        echo "SSH not available on $host after $((retries * delay))s"
        return 1
      }
    - |
      wait_for_ssh_pass() {
        local host=$1 user=$2 retries=30 delay=10
        echo "Waiting for SSH (password) on $host..."
        for i in $(seq 1 $retries); do
          if sshpass -p "$PI_PASSWORD" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 "$user"@"$host" true 2>/dev/null; then
            echo "SSH ready on $host"
            return 0
          fi
          echo "Attempt $i/$retries failed, retrying in ${delay}s..."
          sleep $delay
        done
        echo "SSH not available on $host after $((retries * delay))s"
        return 1
      }
  script:
    # Generate a fresh join token on the master
    - wait_for_ssh_key "$K8S1" "k8s"
    - |
      JOIN_CMD=$(ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "sudo kubeadm token create --print-join-command")
      echo "Join command: $JOIN_CMD"
      TOKEN=$(echo "$JOIN_CMD" | sed -n 's/.*--token \([^ ]*\).*/\1/p')
      HASH=$(echo "$JOIN_CMD" | sed -n 's/.*sha256:\([^ ]*\).*/\1/p')
      echo "Token: $TOKEN"
      echo "Hash: $HASH"
    # Upload certs for control-plane join
    - |
      CERT_KEY=$(ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "sudo kubeadm init phase upload-certs --upload-certs 2>/dev/null | tail -1")
      echo "Certificate key generated for control-plane join"
    # Join p8s3 as a control-plane node
    - |
      join_pi_cp() {
        local pi_host=$1
        wait_for_ssh_pass "$pi_host" "$PI_USER"
        set +e
        sshpass -p "$PI_PASSWORD" ssh -o StrictHostKeyChecking=no "$PI_USER"@"$pi_host" "sudo bash -s" < scripts/install-pi-k8s.sh $K8S1 $TOKEN $HASH control-plane $CERT_KEY
        rc=$?
        set -e
        if [ $rc -eq 100 ]; then
          echo "Pi $pi_host rebooting for cgroup changes, waiting..."
          sleep 30
          wait_for_ssh_pass "$pi_host" "$PI_USER"
          sshpass -p "$PI_PASSWORD" ssh -o StrictHostKeyChecking=no "$PI_USER"@"$pi_host" "sudo bash -s" < scripts/install-pi-k8s.sh $K8S1 $TOKEN $HASH control-plane $CERT_KEY
        elif [ $rc -ne 0 ]; then
          echo "ERROR: install-pi-k8s.sh failed on $pi_host with exit code $rc"
          exit $rc
        fi
      }
    - join_pi_cp "$PI3"
    # Join worker Pi nodes
    - |
      join_pi() {
        local pi_host=$1
        wait_for_ssh_pass "$pi_host" "$PI_USER"
        set +e
        sshpass -p "$PI_PASSWORD" ssh -o StrictHostKeyChecking=no "$PI_USER"@"$pi_host" "sudo bash -s" < scripts/install-pi-k8s.sh $K8S1 $TOKEN $HASH
        rc=$?
        set -e
        if [ $rc -eq 100 ]; then
          echo "Pi $pi_host rebooting for cgroup changes, waiting..."
          sleep 30
          wait_for_ssh_pass "$pi_host" "$PI_USER"
          sshpass -p "$PI_PASSWORD" ssh -o StrictHostKeyChecking=no "$PI_USER"@"$pi_host" "sudo bash -s" < scripts/install-pi-k8s.sh $K8S1 $TOKEN $HASH
        elif [ $rc -ne 0 ]; then
          echo "ERROR: install-pi-k8s.sh failed on $pi_host with exit code $rc"
          exit $rc
        fi
      }
    - join_pi "$PI1"
    - join_pi "$PI2"
    - join_pi "$PI4"
    - join_pi "$PI5"
    # Label Pi nodes for identification
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "kubectl label node $PI1_NAME node-role.kubernetes.io/pi-worker= --overwrite" || true
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "kubectl label node $PI2_NAME node-role.kubernetes.io/pi-worker= --overwrite" || true
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "kubectl label node $PI3_NAME node-role.kubernetes.io/control-plane= --overwrite" || true
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "kubectl label node $PI4_NAME node-role.kubernetes.io/pi-worker= --overwrite" || true
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "kubectl label node $PI5_NAME node-role.kubernetes.io/pi-worker= --overwrite" || true
    # Verify all nodes
    - ssh -i key -o StrictHostKeyChecking=no k8s@"$K8S1" "kubectl get nodes"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  needs:
    - job: deploy-infra
      optional: true
  allow_failure: true

deploy-metallb:
  stage: deploy
  timeout: 30m
  image:
    name: alpine/k8s:1.29.13
  variables:
    K8S1: 192.168.69.80
  before_script:
    - apk --no-cache add openssh-client kubectl helm
    - |
      if [ ! -f key ]; then
        echo "$SSHKEY" > key
        chmod 600 key
      fi
  script:
    - mkdir -p ~/.kube
    - scp -i key -o StrictHostKeyChecking=no k8s@"$K8S1":~/.kube/config ~/.kube/config
    - export KUBECONFIG=~/.kube/config
    - chmod 600 ~/.kube/config
    - echo "Testing kubectl connectivity..."
    - kubectl get nodes
    - chmod +x deploy-all.sh
    - ./deploy-all.sh metallb-install
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TITLE =~ /-init$/'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure

